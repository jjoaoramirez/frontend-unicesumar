<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dinâmico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="app">
        <h2>Conversor Dinâmico</h2>
        <input type="number" step="0.1" id="inputC" placeholder="Celsius(C)">
        <input type="number" step="0.1" id="inputF" placeholder="Fahrenheit(F)">
    </div>

    <script>
        const celsius = document.getElementById("inputC");
        const fahrenheit = document.getElementById("inputF");

        function convertToF() {
            let c = celsius.value;
            fahrenheit.value = (c * 9 / 5 + 32);
        }

        function convertToC() {
            let f = fahrenheit.value;
            celsius.value = ((f - 32) * 5 / 9);
        }

        celsius.addEventListener("input", convertToF);
        fahrenheit.addEventListener("input", convertToC);
    </script>
</body>
</html>
