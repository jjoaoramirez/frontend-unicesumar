<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de CPF</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 80%;
            padding: 8px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #555;
            color: #fff;
        }

        button:hover {
            background-color: #333;
        }

        #resultado {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .valido {
            color: green;
        }

        .invalido {
            color: red;
        }
    </style>
</head>
<body>
    <div class="app">
        <h2>Validador de CPF</h2>
        <input type="text" id="inputCPF" placeholder="Digite o CPF" maxlength="14">
        <br>
        <button id="btnValidar">Validar</button>
        <p id="resultado"></p>
    </div>

    <script>
        document.getElementById("btnValidar").addEventListener("click", function () {
            const raw = document.getElementById("inputCPF").value.replace(/\D/g, "");
            const resultado = document.getElementById("resultado");

            if (raw.length !== 11 || /^(\d)\1{10}$/.test(raw)) {
                resultado.textContent = "CPF Inválido";
                resultado.className = "invalido";
                return;
            }

            function calcDigito(cpf, tamanho) {
                let soma = 0;
                for (let i = 0; i < tamanho; i++) {
                    soma += parseInt(cpf[i]) * (tamanho + 1 - i);
                }
                let resto = (soma * 10) % 11;
                return resto >= 10 ? 0 : resto;
            }

            const d1 = calcDigito(raw, 9);
            const d2 = calcDigito(raw, 10);

            if (d1 === parseInt(raw[9]) && d2 === parseInt(raw[10])) {
                resultado.textContent = "CPF Válido ✔";
                resultado.className = "valido";
            } else {
                resultado.textContent = "CPF Inválido ✘";
                resultado.className = "invalido";
            }
        });
    </script>
</body>
</html>
